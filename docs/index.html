<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do</title>
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="hero" class="h-[100vh] w-[100vw] flex justify-center items-center bg-slate-800 gap-[1rem]">
        <div id="to-do-box" class="box">
            <!-- topic -->
            <div class="topic">To Do</div>
            <!-- rem parts -->
            <div class="flex flex-col gap-[1rem] p-[1rem]">
                <!-- button -->
                <div class="flex justify-end">
                    <div class="bg-white w-[7rem] flex justify-center items-center rounded-2xl hover:scale-105 transition-all ease-in duration-200 hover:shadow-lg hover:bg-gray-300">
                        <i class="fa-solid fa-plus" style="color: rgba(169, 168, 168, 1.00);"></i>
                        <button id="add_task" class="p-[0.5rem]">Add Task</button>
                    </div>
                </div>
                <!-- content -->
                <div class="flex flex-col gap-2 text-2xl taskbox">
                    
                </div>
            </div>
                
        </div>
        <div id="in-progress-box" class="box">
            <div class="topic">In Progress</div>
        </div>
        <!-- <div id="done-box" class="box">
            <div class="topic">Done</div>
        </div>
        <div id="approved-box" class="box">
            <div class="topic">Approved</div>
        </div> -->
    </div>

    <script src="main.js"></script>
</body>
</html>
